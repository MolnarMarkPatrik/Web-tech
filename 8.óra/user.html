<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Felhasználói Adatlap</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; border: 1px solid #d0d7de; border-radius: 6px; width: 350px; padding: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        img { width: 100%; border-radius: 50%; border: 1px solid #d0d7de; margin-bottom: 16px; }
        h1 { font-size: 24px; margin: 0; }
        .bio { color: #57606a; margin: 12px 0; font-style: italic; }
        .info-item { margin: 8px 0; font-size: 14px; display: flex; align-items: center; }
        .label { font-weight: bold; margin-right: 5px; }
        a { color: #0969da; text-decoration: none; }
        .error { color: red; text-align: center; }
    </style>
</head>
<body>

    <div id="profile-container">
        <p>Betöltés...</p>
    </div>

    <script>
        async function fetchUserData() {
            const container = document.getElementById('profile-container');
            
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('id');

            if (!username) {
                container.innerHTML = '<p class="error">Nincs megadva felhasználó!</p>';
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/users/${username}`);
                
                if (!response.ok) throw new Error('Felhasználó nem található');
                
                const data = await response.json();

                let htmlContent = `<div class="card">`;
                
                if (data.avatar_url) htmlContent += `<img src="${data.avatar_url}" alt="Avatar">`;
                if (data.name) htmlContent += `<h1>${data.name}</h1>`;
                if (data.bio) htmlContent += `<p class="bio">${data.bio}</p>`;
                
                const addField = (label, value, isLink = false) => {
                    if (value && value !== "") {
                        const displayValue = isLink ? `<a href="${value}" target="_blank">${value}</a>` : value;
                        htmlContent += `<div class="info-item"><span class="label">${label}:</span> ${displayValue}</div>`;
                    }
                };

                addField('Blog', data.blog, true);
                addField('Helyszín', data.location);
                addField('Nyilvános repók', data.public_repos);
                addField('Követők', data.followers);

                htmlContent += `<br><a href="user-search.html">← Vissza a kereséshez</a>`;
                htmlContent += `</div>`;
                
                container.innerHTML = htmlContent;

            } catch (error) {
                container.innerHTML = `<p class="error">Hiba: ${error.message}</p>`;
            }
        }

        fetchUserData();
    </script>
</body>
</html>
