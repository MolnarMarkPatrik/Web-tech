<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felhasználói adatlap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>GitHub Felhasználói Adatlap</h1>
        
        <div id="loader">Adatok betöltése...</div>

        <div id="profile-card" class="hidden">
            <img id="avatar_url" alt="Profilkép" style="width: 150px; border-radius: 50%;">
            <h2 id="name"></h2>
            <p id="bio-container"><strong>Bio:</strong> <span id="bio"></span></p>
            <p id="location-container"><strong>Helyszín:</strong> <span id="location"></span></p>
            <p id="blog-container"><strong>Blog:</strong> <a id="blog" target="_blank"></a></p>
            <p><strong>Repók száma:</strong> <span id="public_repos"></span></p>
            <p><strong>Követők:</strong> <span id="followers"></span></p>
        </div>

        <br>
        <a href="user-search.html" class="btn">Vissza a kereséshez</a>
    </div>

    <script>
        async function fetchUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('id');

            if (!username) {
                document.getElementById('loader').innerText = "Nincs megadva felhasználónév!";
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/users/${username}`);
                if (!response.ok) throw new Error("A felhasználó nem található.");
                
                const data = await response.json();

                displayData(data);

            } catch (error) {
                document.getElementById('loader').innerText = "Hiba: " + error.message;
            }
        }

        function displayData(user) {
            const setField = (id, value, containerId = null) => {
                const el = document.getElementById(id);
                if (!value || value === "") {
                    if (containerId) document.getElementById(containerId).style.display = 'none';
                    else el.style.display = 'none';
                } else {
                    if (el.tagName === 'A') {
                        el.href = value.startsWith('http') ? value : `https://${value}`;
                        el.innerText = value;
                    } else if (el.tagName === 'IMG') {
                        el.src = value;
                    } else {
                        el.innerText = value;
                    }
                }
            };

            setField('avatar_url', user.avatar_url);
            setField('name', user.name);
            setField('bio', user.bio, 'bio-container');
            setField('location', user.location, 'location-container');
            setField('blog', user.blog, 'blog-container');
            setField('public_repos', user.public_repos);
            setField('followers', user.followers);

            document.getElementById('loader').style.display = 'none';
            document.getElementById('profile-card').classList.remove('hidden');
        }

        fetchUser();
    </script>
</body>
</html>
